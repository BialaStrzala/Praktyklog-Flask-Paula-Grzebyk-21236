{% block pagetitle %}
Login
{% endblock %}

{% block pagecontent %}
<div>
    <h1>Login</h1>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}
    <form method="POST">
        <button type="submit">Login with Microsoft Account</button>
    </form>
</div>
{% endblock %}
