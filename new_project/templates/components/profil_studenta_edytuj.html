{% extends 'layout.html' %}

{% block content %}

<div class="container-fluid">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="page-title mb-1">Edytuj profil</h1>
            <p class="text-muted mb-0">
                Zaktualizuj swoje dane studenta.
            </p>
        </div>

        <a href="{{ url_for('student.profil_studenta') }}"
           class="btn btn-secondary">
            Powrót
        </a>
    </div>

    <!-- Form -->
    <div class="card">

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <!-- Imię -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Imię
                        </label>

                        <input type="text"
                               name="imie"
                               class="form-control"
                               value="{{ profil.uzytkownik.imie }}"
                               disabled>
                    </div>

                    <!-- Nazwisko -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Nazwisko
                        </label>

                        <input type="text"
                               name="nazwisko"
                               class="form-control"
                               value="{{ profil.uzytkownik.nazwisko }}"
                               disabled>
                    </div>

                    <!-- Telefon -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Telefon
                        </label>

                        <input type="text"
                               name="telefon"
                               class="form-control"
                               value="{{ profil.uzytkownik.telefon or '' }}">
                    </div>

                    <!-- Email -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               class="form-control"
                               value="{{ profil.uzytkownik.email }}"
                               disabled>
                    </div>

                    <!-- Indeks -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Numer indeksu
                        </label>

                        <input type="text"
                               name="indeks"
                               class="form-control"
                               value="{{ profil.indeks or '' }}"
                               disabled>
                    </div>

                    <!-- Semestr -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Semestr
                        </label>

                        <input type="number"
                               name="semestr"
                               class="form-control"
                               value="{{ profil.semestr or '' }}">
                    </div>

                    <!-- Kierunek -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Kierunek
                        </label>

                        <input type="text"
                               name="kierunek"
                               class="form-control"
                               value="{{ profil.kierunek or '' }}">
                    </div>

                    <!-- Specjalność -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Specjalność
                        </label>

                        <input type="text"
                               name="specjalnosc"
                               class="form-control"
                               value="{{ profil.specjalnosc or '' }}">
                    </div>

                    <!-- Rok akademicki -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Rok akademicki
                        </label>

                        <input type="text"
                               name="rok_akademicki"
                               class="form-control"
                               placeholder="2025/2026"
                               value="{{ profil.rok_akademicki or '' }}">
                    </div>

                    <!-- Tryb studiów -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label d-block">
                            Tryb studiów
                        </label>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input"
                                   type="radio"
                                   name="czy_stacjonarne"
                                   value="1"
                                   {% if profil.czy_stacjonarne %}checked{% endif %}>

                            <label class="form-check-label">
                                Stacjonarne
                            </label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input"
                                   type="radio"
                                   name="czy_stacjonarne"
                                   value="0"
                                   {% if not profil.czy_stacjonarne %}checked{% endif %}>

                            <label class="form-check-label">
                                Niestacjonarne
                            </label>
                        </div>

                    </div>

                </div>

                <!-- Submit -->
                <div class="d-flex justify-content-end mt-4">
                    <button type="submit"
                            class="btn btn-primary">
                        Zapisz zmiany
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
